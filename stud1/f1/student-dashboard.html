<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Dashboard | EduManage</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <div class="dashboard-outer">
        <header class="dashboard-header-bar">
            <div class="header-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>EduManage <span>Student Portal</span></h2>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary btn-sm"><i class="fa-solid fa-house"></i> Home</a>
                <a href="student-home.html" class="btn btn-secondary btn-sm"><i class="fa-solid fa-chevron-left"></i> Back</a>
                <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</button>
            </div>
        </header>
        
        <div class="dashboard-container">
            <div class="profile-layout">
                <div class="profile-side">
                    <div class="profile-avatar">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>
                    <h3 id="profile-card-name">Loading...</h3>
                    <p class="role-badge">Student Status: Enrolled</p>
                </div>
                
                <div class="profile-details-grid">
                    <div class="detail-card">
                        <div class="detail-icon"><i class="fa-solid fa-id-card"></i></div>
                        <div class="detail-info">
                            <span class="detail-label">Student ID</span>
                            <span class="detail-val" id="profile-val-id">-</span>
                        </div>
                    </div>
                    
                    <div class="detail-card">
                        <div class="detail-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div class="detail-info">
                            <span class="detail-label">Email Address</span>
                            <span class="detail-val" id="profile-val-email">-</span>
                        </div>
                    </div>
                    
                    <div class="detail-card">
                        <div class="detail-icon"><i class="fa-solid fa-building"></i></div>
                        <div class="detail-info">
                            <span class="detail-label">Department</span>
                            <span class="detail-val" id="profile-val-dept">-</span>
                        </div>
                    </div>
                    
                    <div class="detail-card">
                        <div class="detail-icon"><i class="fa-solid fa-phone"></i></div>
                        <div class="detail-info">
                            <span class="detail-label">Contact Number</span>
                            <span class="detail-val" id="profile-val-contact">-</span>
                        </div>
                    </div>
                    
                    <div class="detail-card full-span">
                        <div class="detail-icon"><i class="fa-solid fa-house"></i></div>
                        <div class="detail-info">
                            <span class="detail-label">Residential Address</span>
                            <span class="detail-val" id="profile-val-address">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script File -->
    <script src="student-dashboard.js"></script>
</body>
</html>
